name: Test

on:
  workflow_run:
    workflows: ["Compile Check"]
    types: [completed]

jobs:
  test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: lo3-binary
          path: bin/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Make executable
        run: chmod +x bin/lo3

      - name: Run all test files
        id: tests
        run: |
          failed=0
          for f in tests/*.lo3; do
            echo "::group::Running $f"
            if ./bin/lo3 "$f"; then
              echo "PASS: $f"
            else
              echo "FAIL: $f"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

      - name: Run general test
        run: ./bin/lo3 tests/general.lo3

      - name: Report test status
        if: always()
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "## ✅ Tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Tests failed" >> $GITHUB_STEP_SUMMARY
            echo "One or more test files **failed**. Check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
