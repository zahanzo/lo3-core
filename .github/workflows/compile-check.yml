name: Compile Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        id: build
        run: |
          cmake -B build
          cmake --build build

      - name: Upload binary
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: lo3-binary
          path: bin/lo3

      - name: Report compilation status
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "## ✅ Compilation succeeded" >> $GITHUB_STEP_SUMMARY
            echo "The source code compiled successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Compilation failed" >> $GITHUB_STEP_SUMMARY
            echo "The source code **failed to compile**. Tests will not run." >> $GITHUB_STEP_SUMMARY
          fi

  test:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: lo3-binary
          path: bin/

      - name: Make executable
        run: chmod +x bin/lo3

      - name: Run all test files
        id: tests
        run: |
          failed=0
          for f in tests/*.lo3; do
            echo "::group::Running $f"
            if ./bin/lo3 "$f"; then
              echo "PASS: $f"
            else
              echo "FAIL: $f"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

      - name: Run general test
        run: ./bin/lo3 tests/general.lo3

      - name: Report test status
        if: always()
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            echo "## ✅ Tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Tests failed" >> $GITHUB_STEP_SUMMARY
            echo "One or more test files **failed**. Check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
